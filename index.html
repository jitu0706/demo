<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be Mine? 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(45deg, #ff6b9d, #c44569, #f8b500, #ff9f43);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.8);
            font-size: 20px;
            animation: float 6s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            text-align: center;
            z-index: 10;
            position: relative;
        }

        h1 {
            font-size: 3.5em;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 30px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .buttons {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 20px 40px;
            font-size: 1.5em;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
            z-index: 20;
            user-select: none;
        }

        .yes-btn {
            background: linear-gradient(45deg, #ff6b9d, #ff8e8e);
            color: white;
        }

        .yes-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(255, 107, 157, 0.6);
        }

        .no-btn {
            background: linear-gradient(45deg, #6c5ce7, #a29bfe);
            color: white;
            transition: all 0.1s ease; /* Faster transition for hover effect */
        }

        .no-btn:hover {
            transform: scale(1.05) !important; /* Quick scale before moving */
            box-shadow: 0 15px 40px rgba(108, 92, 231, 0.8);
        }

        .romantic-message {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #ff9a9e, #fecfef, #fecfef, #ff9a9e);
            background-size: 400% 400%;
            animation: gradientShift 10s ease infinite;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
            padding: 50px;
        }

        .romantic-message.show {
            display: flex;
        }

        .romantic-title {
            font-size: 4em;
            color: #d63031;
            margin-bottom: 30px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }

        .romantic-text {
            font-size: 1.8em;
            color: #2d3436;
            line-height: 1.6;
            max-width: 800px;
            margin-bottom: 40px;
            animation: fadeInUp 1s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .love-gif {
            width: 200px;
            height: 200px;
            margin: 20px 0;
            font-size: 4em;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.3); }
            28% { transform: scale(1); }
            42% { transform: scale(1.3); }
            70% { transform: scale(1); }
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5em; }
            .romantic-title { font-size: 2.5em; }
            .romantic-text { font-size: 1.3em; }
            .btn { padding: 15px 30px; font-size: 1.2em; }
        }
    </style>
</head>
<body>
    <div class="hearts" id="hearts"></div>
    
    <div class="container">
        <h1>💖 Will You Be My Girlfriend? 💖</h1>
        <div class="buttons">
            <button class="btn yes-btn" onclick="showRomanticMessage()">Yes 😍</button>
            <button class="btn no-btn" id="noBtn">No 😢</button>
        </div>
    </div>

    <div class="romantic-message" id="romanticMsg">
        <div class="love-gif">💕💕💕</div>
        <h1 class="romantic-title">YAYYY! I KNEW IT! 🎉</h1>
        <div class="romantic-text">
            From the moment I met you, my heart knew you were the one. 
            <br><br>
            Every smile, every laugh, every moment with you feels like a dream. 
            <br><br>
            I promise to love you, cherish you, and make you happy every single day. 
            <br><br>
            You make my world complete, my love. 💕
        </div>
        <button class="btn yes-btn" onclick="restart()" style="font-size: 1.2em;">Play Again 💕</button>
    </div>

    <script>
        // Create floating hearts
        function createHearts() {
            const heartsContainer = document.getElementById('hearts');
            for (let i = 0; i < 50; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = ['💖', '💕', '💗', '💓', '💞'][Math.floor(Math.random() * 5)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
                heart.style.animationDelay = Math.random() * 2 + 's';
                heartsContainer.appendChild(heart);
            }
        }

        const noBtn = document.getElementById('noBtn');
        let isGameWon = false;

        // Move No button on HOVER - SUPER CHALLENGING!
        noBtn.addEventListener('mouseenter', function(e) {
            if (isGameWon) return;
            
            // Get mouse position and move AWAY from it
            const rect = noBtn.getBoundingClientRect();
            const mouseX = e.clientX;
            const mouseY = e.clientY;
            
            // Calculate escape direction (opposite of mouse)
            const escapeX = mouseX > window.innerWidth / 2 ? 10 : window.innerWidth - 220;
            const escapeY = mouseY > window.innerHeight / 2 ? 10 : window.innerHeight - 150;
            
            // Random movement within bounds
            const randomX = Math.random() * (window.innerWidth - 220) + 10;
            const randomY = Math.random() * (window.innerHeight - 150) + 10;
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
            noBtn.style.transition = 'left 0.3s ease, top 0.3s ease, transform 0.2s ease';
            
            // Funny shake + scale effect
            noBtn.style.transform = 'scale(1.2) rotate(' + (Math.random() * 20 - 10) + 'deg)';
            
            setTimeout(() => {
                noBtn.style.transform = 'scale(1) rotate(0deg)';
            }, 200);
            
            // Playful taunt sound effect (visual)
            showTaunt();
        });

        // Show funny taunt messages
        function showTaunt() {
            const taunts = [
                "😏 Not so fast!",
                "😂 Try again!",
                "🤭 You're too slow!",
                "😜 Catch me if you can!",
                "😈 Nope!",
                "🤪 Missed me!"
            ];
            
            const randomTaunt = taunts[Math.floor(Math.random() * taunts.length)];
            noBtn.textContent = randomTaunt;
            
            setTimeout(() => {
                noBtn.textContent = 'No 😢';
            }, 1000);
        }

        // Also move on CLICK (backup)
        noBtn.addEventListener('click', function(e) {
            e.preventDefault();
            moveNoButton();
        });

        function moveNoButton() {
            const maxX = window.innerWidth - 220;
            const maxY = window.innerHeight - 150;
            const newX = Math.random() * maxX + 10;
            const newY = Math.random() * maxY + 10;
            
            noBtn.style.left = newX + 'px';
            noBtn.style.top = newY + 'px';
        }

        // Show romantic message
        function showRomanticMessage() {
            isGameWon = true;
            document.getElementById('romanticMsg').classList.add('show');
            document.body.style.overflow = 'hidden';
            createFireworks();
        }

        // Restart the page
        function restart() {
            location.reload();
        }

        // Simple fireworks effect
        function createFireworks() {
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const firework = document.createElement('div');
                    firework.innerHTML = ['✨', '🎉', '💫', '⭐', '🌟'][Math.floor(Math.random() * 5)];
                    firework.style.position = 'fixed';
                    firework.style.left = Math.random() * 100 + 'vw';
                    firework.style.top = Math.random() * 100 + 'vh';
                    firework.style.fontSize = '30px';
                    firework.style.pointerEvents = 'none';
                    firework.style.zIndex = '1000';
                    firework.style.animation = 'float 2s linear forwards';
                    document.body.appendChild(firework);
                    
                    setTimeout(() => firework.remove(), 2000);
                }, i * 80);
            }
        }

        // Initialize
        createHearts();

        // Prevent right-click, F12, and text selection
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || e.key === 'F5') {
                e.preventDefault();
            }
        });
        document.addEventListener('selectstart', e => e.preventDefault());
    </script>
</body>
</html>
